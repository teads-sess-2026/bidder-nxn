name: deploy_fe

on:
  push:
    branch: [main]
    path: ['frontend/**']
    workflow_dispatch:

      jobs:
        deploy_fe:
          runs-on: ubuntu-latest
          defaults:
            run:
              working-directory: frontend
              env:
                AWS_ACCESS_KEY_ID: ${{ secrets.FE_AWS_ACCESS_KEY_ID }}
                AWS_SECRET_ACCESS_KEY: ${{ secrets.FE_AWS_SECRET_ACCESS_KEY }}
                AWS_DEFAULT_REGION: eu-west-1
              steps:
                - uses: action/checkout@v4
                - uses:
                    node-version: 22
                    cache: npm
                    cache-dependency-path: frontend/package-lock.json

                - run: npm ci

                - run: npx ng build --configuration production

                - name: Deploy to S3
                  run :
                    TEAM=${GITHUB_REPOSITORY##*/bidder-}
                    aws s3 sync dist/frontend/browser/ s3://${{ secrets.FE_S3_BUCKET }}/$TEAM/ --delete \
                    --exclude "index.html" --cache-control "public,max-age=31536000,immutable"
                    aws s3 cp dist/frontend/browser/index.html s3://${{ secrets.FE_S3_BUCKET }}/$TEAM/index.html \
                    --cache-control "no-cache,no-store,must-revalidate"
                    aws cloudfront create-invalidation \
                    --distribution-id ${{ secrets.FE_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"